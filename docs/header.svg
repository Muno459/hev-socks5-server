<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#79c0ff"/>
      <stop offset="100%" style="stop-color:#d2a8ff"/>
    </linearGradient>
    <linearGradient id="line-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#79c0ff" stop-opacity="0"/>
      <stop offset="50%" style="stop-color:#d2a8ff" stop-opacity="0.6"/>
      <stop offset="100%" style="stop-color:#79c0ff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="800" height="220" fill="url(#bg)" rx="10"/>

  <!-- Packet trace lines - slow, subtle, moving left to right -->
  <g opacity="0.06">
    <line x1="-100" y1="45" x2="900" y2="45" stroke="#79c0ff" stroke-width="0.5" stroke-dasharray="4 12">
      <animate attributeName="stroke-dashoffset" from="0" to="-48" dur="6s" repeatCount="indefinite"/>
    </line>
    <line x1="-100" y1="105" x2="900" y2="105" stroke="#d2a8ff" stroke-width="0.5" stroke-dasharray="4 16">
      <animate attributeName="stroke-dashoffset" from="0" to="-60" dur="8s" repeatCount="indefinite"/>
    </line>
    <line x1="-100" y1="165" x2="900" y2="165" stroke="#79c0ff" stroke-width="0.5" stroke-dasharray="4 20">
      <animate attributeName="stroke-dashoffset" from="0" to="-72" dur="10s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Main title -->
  <text x="400" y="95" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="62" font-weight="700" fill="url(#title-grad)" letter-spacing="6">
    SKYPROXY
  </text>

  <!-- Subtitle -->
  <text x="400" y="130" text-anchor="middle" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" fill="#8b949e" letter-spacing="3">
    NATIVE TCP/IP FINGERPRINT SPOOFING
  </text>

  <!-- Bottom info line -->
  <text x="400" y="165" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="11" fill="#484f58">
    ftrace + kprobes  //  zero netfilter  //  p0f distance 0
  </text>

  <!-- Accent line with slow pulse -->
  <rect x="250" y="182" width="300" height="1" fill="url(#line-grad)">
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Corner accents -->
  <polyline points="20,30 20,20 30,20" fill="none" stroke="#30363d" stroke-width="1.5"/>
  <polyline points="770,20 780,20 780,30" fill="none" stroke="#30363d" stroke-width="1.5"/>
  <polyline points="20,190 20,200 30,200" fill="none" stroke="#30363d" stroke-width="1.5"/>
  <polyline points="770,200 780,200 780,190" fill="none" stroke="#30363d" stroke-width="1.5"/>

  <!-- Blinking cursor after title -->
  <rect x="588" y="72" width="3" height="28" fill="#79c0ff">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
